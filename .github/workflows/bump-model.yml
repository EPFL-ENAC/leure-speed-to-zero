name: Bump transition-compass-model version

on:
  repository_dispatch:
    types: [model-updated]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Model version tag (e.g., v1.2.3)'
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.LEURE_SPEED_TO_ZERO_BUMP_MODEL_TOKEN }}
          ref: dev

      - name: Get tag
        id: tag
        run: |
          TAG=${{ github.event.client_payload.tag || github.event.inputs.tag }}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Pin new tag in pyproject.toml
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          sed -i "s|transition-compass-model @ git+https://github.com/EPFL-ENAC/transition-compass-model.git[^\"]*|transition-compass-model @ git+https://github.com/EPFL-ENAC/transition-compass-model.git@${TAG}|" backend/pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Configure git credentials (for private model repo)
        env:
          MODEL_REPO_TOKEN: ${{ secrets.MODEL_REPO_TOKEN }}
        run: |
          if [ -n "$MODEL_REPO_TOKEN" ]; then
            git config --global url."https://${MODEL_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Regenerate lock file
        run: cd backend && uv lock

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.LEURE_SPEED_TO_ZERO_BUMP_MODEL_TOKEN }}
          commit-message: "chore: bump transition-compass-model to ${{ steps.tag.outputs.tag }}"
          title: "chore: bump transition-compass-model to ${{ steps.tag.outputs.tag }}"
          body: |
            Automated version bump of `transition-compass-model` to `${{ steps.tag.outputs.tag }}`.

            **Changes:**
            - `backend/pyproject.toml` — git URL pinned to `${{ steps.tag.outputs.tag }}`
            - `backend/uv.lock` — regenerated with new commit SHA

            Review the diff and merge to deploy the new model version.
          branch: "chore/bump-model-${{ steps.tag.outputs.tag }}"
          base: dev
          labels: dependencies
